<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Dodge Game</title>
    <link rel="stylesheet" href="game.css">
</head>

<body>

<center>
    <h1>Arrow Dodge Game</h1>
</center>

<h2 align="center">
    Score : <span id="score">0</span>
</h2>

<div class="parent">

    <div class="player"></div>

    <div class="arrow"></div>

</div>

<div class="gameover">
    <h1>GAME OVER</h1>
    <button id="restart">Restart</button>
</div>

<script src="game.js"></script>

</body>
</html>
